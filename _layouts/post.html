---
layout: default
---

<article>
  <h1 class="text-3xl font-semibold tracking-tight">{{ page.title }}</h1>
  <time datetime="{{ page.date | date_to_xmlschema }}" class="block mt-2 text-sm text-gray-600">
    {{ page.date | date: "%B %-d, %Y" }}
  </time>
  <div class="prose mt-8 max-w-none">
    {{ content }}
  </div>
</article>
